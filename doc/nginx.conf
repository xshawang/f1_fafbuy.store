user  root;
worker_processes  auto;

error_log  /var/log/nginx/error.log info;
#pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
        use epoll;                # Linux 下最高效的事件模型
    multi_accept on;          # 让一个进程一次性接收所有新连接
}

http {

	# 只信任 CloudFront IP（关键！）
map $http_x_forwarded_for $real_client_ip {
        # 默认使用 $remote_addr
        default $remote_addr;
        # 正则匹配，取出逗号前的第一个 IP
        "~^([^,]+)" $1;
    }
    include       /usr/local/openresty/nginx/conf/mime.types;
    default_type  application/octet-stream;

       log_format  main  '$real_client_ip - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      '"$upstream_cache_status"';

	      #access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush     on;

    keepalive_timeout  65;
    keepalive_requests 1000; # 一个长连接上允许的最大请求数

    # 开启 gzip 压缩
    #gzip on;
    #gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    # gzip_min_length 1k;
    #gzip_comp_level 6;

    # Lua 库路径 (Linux)
    lua_package_path "/usr/local/openresty/lualib/?.lua;/usr/local/openresty/lualib/?/init.lua;;";
    lua_package_cpath "/usr/local/openresty/lualib/?.so;;";

    # 定义上游服务器（强制使用 IPv4）
    upstream shop_app_backend {
        server 23.227.38.65:443;  # shop.app 的 IPv4 地址
        keepalive 32;
    }

    upstream store_fifa_backend {
        server 23.227.38.74:443;  # store.fifa.com 的 IPv4 地址
        keepalive 32;
    }

    upstream api {
	    server 127.0.0.1:3000;
	   server 127.0.0.1:3001;
      keepalive 32;
    }
    
    # 缓存代理服务器配置 - store.fif.com (HTTPS)
    server {

        listen 9999;
        server_name  localhost;
        # 日志配置
        access_log  /var/log/nginx/store-fifaabc-access.log  main;
        error_log   /var/log/nginx/store-fifaabc-error.log  info;

        # 使用 Lua 脚本实现缓存
        location / {
            content_by_lua_block {
                local cache = require "fifa_cache"
                local uri = ngx.var.uri
                local args = ngx.var.args
                
                -- 仅处理 GET 请求的缓存
                if ngx.var.request_method == "GET" then
                    -- 尝试从缓存获取
                    local cached_content = cache.get_cached_response(uri, args)
                    if cached_content then
                        ngx.log(ngx.INFO, "Cache HIT: ", uri)
                        ngx.header["X-Cache-Status"] = "HIT"
                        ngx.header["X-Cache-Key"] = uri
                        ngx.header["Content-Type"] = "text/html; charset=utf-8"
                        ngx.say(cached_content)
                        return
                    else
                        ngx.log(ngx.INFO, "Cache MISS: ", uri)
                        ngx.header["X-Cache-Status"] = "MISS"
                    end
                end
                
                -- 缓存未命中或非 GET 请求，代理到上游
                ngx.exec("@proxy_to_upstream")
            }
        }
        
        # 上游代理
        location @proxy_to_upstream {
            internal;
            proxy_pass https://store_fifa_backend;
            
            # 关键：强制设置 Host 头为 store.fifa.com，避免 421 错误
            # 当请求域名不是 store.fifa.com 或 fifa.com 时，统一使用 store.fifa.com
            proxy_set_header Host store.fifa.com;
            proxy_set_header :authority store.fifa.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 转发所有原始请求头（除了被上面覆盖的）
            proxy_pass_request_headers on;
            
            # 关键：让上游返回未压缩的内容，避免 gzip 解压问题
            proxy_set_header Accept-Encoding "";
            
            # 增加缓冲区大小
            proxy_buffer_size 16k;
            proxy_buffers 4 32k;
            proxy_busy_buffers_size 64k;
            proxy_temp_file_write_size 64k;
            
            # SSL 设置
            proxy_ssl_server_name on;
            proxy_ssl_name store.fifa.com;
            proxy_ssl_verify off;
            
            # 禁用 IPv6，只使用 IPv4
            resolver 8.8.8.8 8.8.4.4 valid=300s ipv6=off;
            
            # 超时设置
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            # 添加调试日志，记录实际发送的 Host 头
            log_by_lua_block {
                ngx.log(ngx.INFO, "Proxying to upstream - Original URI: ", ngx.var.uri, ", Host header: store.fifa.com")
            }
            
            # 在响应阶段缓存内容（仅 GET 请求）
             body_filter_by_lua_block {
                if ngx.var.request_method == "GET" and ngx.status == 200 then
                    local chunk, eof = ngx.arg[1], ngx.arg[2]
                    
                    local cached_body = ngx.ctx.cached_body or ""
                    if chunk then
                        cached_body = cached_body .. chunk
                        ngx.ctx.cached_body = cached_body
                    end
                    
                    if eof then
                        local cache = require "fifa_cache"
                        local uri = ngx.var.uri
                        cache.save_to_cache(uri, ngx.var.args, cached_body)
                    end
                end
            }
            
            # 处理 302 重定向，保留语言前缀
            header_filter_by_lua_block {
                -- 检查是否为 302 响应并重写 Location 头
                if ngx.header.location and ngx.status == 302 then
                    local location = ngx.header.location
                    local original_uri = ngx.var.uri
                    
                    -- 提取语言前缀（如 /pt/）
                    local lang_prefix = original_uri:match("^(/[^/]+)")
                    
                    if lang_prefix and lang_prefix ~= "/products" and lang_prefix ~= "/collections" then
                        -- 如果 Location 包含 /products/ 或 /collections/，添加语言前缀
                        if location:match("/products/") or location:match("/collections/") then
                            -- 将 /products/... 替换为 /pt/products/...
                            location = string.gsub(location, "(/products/)", lang_prefix .. "%1", 1)
                            location = string.gsub(location, "(/collections/)", lang_prefix .. "%1", 1)
                            ngx.header.location = location
                            ngx.log(ngx.INFO, "Rewritten redirect: ", ngx.var.uri, " -> ", location)
                        end
                    end
                end
            }
        }

        # shop_pay_callback 特殊处理：修改 302 响应头中的 Location 域名
        location /shop_pay_callback {
            # 代理到上游服务器
            proxy_pass https://shop_app_backend;
            
            # 关键：强制设置 Host 头为 store.fifa.com，避免 421 错误
            proxy_set_header Host store.fifa.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # SSL 设置
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
            
            # 超时设置
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            # 使用 Lua 修改响应头
            header_filter_by_lua_block {
                -- 检查是否为 302 响应
                if ngx.header.location and ngx.status == 302 then
                    local location = ngx.header.location
                    -- 将 https://store.fifa.com 替换为 https://storefifa.googletagmaneager.com
                    location = string.gsub(location, "https://store.fifa.com", "https://storefifa.googletagmaneager.com")
                    ngx.header.location = location
                end
            }
        }
        
