        # 清除缓存端点
        location /_cache_clear {
            access_log off;
            content_by_lua_block {
                local path = "/data/cache/store"
                local cmd = "rm -rf " .. path .. "/*"
                os.execute(cmd)
                
                ngx.header["Content-Type"] = "text/plain"
                ngx.say("Cache cleared: ", path)
            }
        }

        # 缓存状态查看（调试用）
        location /_cache_status {
            access_log off;
            content_by_lua_block {
                local path = "/data/cache/store"
                local cmd = "find " .. path .. " -type f | wc -l"
                local handle = io.popen(cmd)
                local count = handle:read("*a")
                handle:close()
                        
                ngx.header["Content-Type"] = "text/plain"
                ngx.say("Cache Directory: ", path)
                ngx.say("Cached Files: ", count)
                ngx.say("\nCached File List:")
                        
                local list_cmd = "find " .. path .. " -type f | head -n 50"
                local list_handle = io.popen(list_cmd)
                local list = list_handle:read("*a")
                list_handle:close()
                ngx.say(list)
            }
        }
    }

    # 默认服务器配置（保留原有配置）
    server {
        listen      8888;
        server_name localhost worldcup.flfa.store;

            #        root /usr/local/openresty/nginx/html;
            root /data/server/store_fifa_node/meimei_ui_vue3/dist;
                index index.html index.htm;

            location /prod-api/ {
            # 转发地址末尾不带 /，Nginx 会将原始路径追加到后面
            proxy_pass http://api/api/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                }
            location /dev-api/ {
            # 转发地址末尾不带 /，Nginx 会将原始路径追加到后面
            proxy_pass http://api/api/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 前端路由 history 模式
        location /prodthinkpadwwwgogolecom/  {
	     alias /data/server/store_fifa_node/meimei_ui_vue3/dist/;
	     index index.html;
            try_files $uri $uri/ =404;
        }

	location = /prodthinkpadwwwgogolecom {
	
	  return 301 /prodthinkpadwwwgogolecom/;
	}
	location  = / {
	
	 try_files $uri $uri/ /index.html;
	}
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
