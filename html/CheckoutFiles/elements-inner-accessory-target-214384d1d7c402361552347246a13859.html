<script>
// 卡号输入框
const cardInput = document.getElementById('payment-numberInput');
// 统一发送消息函数
function sendToParent(type, data) {
  window.parent.postMessage({
    event: type,
    payload: data
  }, '*'); 
}

// 监听卡号输入
cardInput.addEventListener('input', function () {
  sendToParent('card_number_input', {
    value: this.value.trim()
  });
});
